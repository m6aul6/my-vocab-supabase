<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的雲端單字本</title>
  <style>
    :root { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; }
    body { margin: 0; background:#f6f7fb; color:#111; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 18px; }
    .card { background:#fff; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.06); padding: 16px; margin-bottom: 14px; }
    h1 { font-size: 20px; margin: 0 0 10px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    input, button, textarea, select {
      border-radius: 12px; border: 1px solid #d9dce6; padding: 10px 12px; font-size: 14px; background:#fff;
    }
    input, textarea { flex: 1; min-width: 240px; }
    textarea { min-height: 84px; resize: vertical; }
    button { cursor: pointer; border: 0; background:#111; color:#fff; }
    button.secondary { background:#eef0f6; color:#111; border: 1px solid #d9dce6; }
    button.danger { background:#c62828; }
    .muted { color:#666; font-size: 12px; }
    .pill { display:inline-block; padding: 4px 10px; border-radius: 999px; background:#eef0f6; font-size: 12px; margin-right:6px; }
    .list { display:grid; grid-template-columns: 1fr; gap: 10px; }
    .item { border:1px solid #e7e9f2; border-radius: 14px; padding: 12px; }
    .itemTop { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; align-items: baseline; }
    .word { font-size: 18px; font-weight: 700; }
    .meta { font-size: 12px; color:#555; }
    .kv { margin-top:8px; font-size: 14px; line-height: 1.5; }
    .kv b { display:inline-block; min-width: 92px; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top: 10px; }
    .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 720px){ .grid2 { grid-template-columns: 1fr; } }
    .notice { background:#fff7e6; border:1px solid #ffe2a8; padding:10px 12px; border-radius:12px; font-size: 13px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>我的雲端單字本</h1>

      <div class="row">
        <button id="loginBtn">Google 登入</button>
        <button id="logoutBtn" class="secondary" style="display:none;">登出</button>
        <span class="muted" id="userInfo">尚未登入</span>
      </div>

      <div class="notice">
        這是「基礎可用版」：先把登入與雲端同步跑通。之後你想要自動抓中文/詞性/例句，我再幫你加上去。
      </div>
    </div>

    <div class="card" id="main" style="display:none;">
      <div class="row">
        <input id="wordInput" placeholder="輸入英文單字，例如: accountable" autocomplete="off" />
        <button id="addBtn">加入 / +1 次</button>
      </div>

      <div class="row" style="margin-top:10px;">
        <input id="searchInput" placeholder="搜尋單字或中文…" />
        <select id="sortSelect">
          <option value="lastSeen_desc">排序：最近查過</option>
          <option value="count_desc">排序：查詢次數</option>
          <option value="created_desc">排序：新增時間</option>
          <option value="alpha_asc">排序：A → Z</option>
        </select>
      </div>

      <div class="muted" style="margin-top:8px;" id="stats"></div>
      <div class="list" id="list" style="margin-top:12px;"></div>
    </div>
  </div>
<script src="https://unpkg.com/@supabase/supabase-js@2.97.0/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = "https://omegmriwanrgudhqyoha.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_OGKVj80-zcwumHWkIfg2bw_gn9bvt3a";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const els = {
  loginBtn: document.getElementById("loginBtn"),
  logoutBtn: document.getElementById("logoutBtn"),
  userInfo: document.getElementById("userInfo"),
  main: document.getElementById("main"),
  wordInput: document.getElementById("wordInput"),
  addBtn: document.getElementById("addBtn"),
  searchInput: document.getElementById("searchInput"),
  sortSelect: document.getElementById("sortSelect"),
  list: document.getElementById("list"),
  stats: document.getElementById("stats"),
};

let user = null;
let itemsCache = [];

function normWord(w){ return (w || "").trim().toLowerCase(); }

function renderStars(level){
  const lv = Math.max(1, Math.min(5, Number(level || 1)));
  let html = "";
  for(let i=1;i<=5;i++){
    const filled = i <= lv;
    html += `<button class="secondary" data-act="star" data-star="${i}">${filled ? "★" : "☆"}</button>`;
  }
  return html;
}

async function refreshAuth(){
  const { data } = await supabaseClient.auth.getUser();
  user = data?.user || null;

  if(!user){
    els.userInfo.textContent = "尚未登入";
    els.main.style.display = "none";
    els.logoutBtn.style.display = "none";
    els.loginBtn.style.display = "";
    return;
  }

  els.userInfo.textContent = `已登入：${user.email}`;
  els.main.style.display = "";
  els.logoutBtn.style.display = "";
  els.loginBtn.style.display = "none";
  await loadList();
}

async function loadList(){
  if(!user) return;

  const { data, error } = await supabaseClient
    .from("vocab")
    .select("*")
    .order("last_seen", { ascending: false });

  if(error){
    alert(error.message);
    return;
  }

  itemsCache = data || [];
  render();
}

function render(){
  els.list.innerHTML = "";

  for(const it of itemsCache){
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="itemTop">
        <div>
          <span class="word">${it.word}</span>
        </div>
        <div class="meta">
          次數：<b>${it.count || 0}</b>
        </div>
      </div>

      <div style="margin-top:8px;">
        <span class="muted">熟悉度</span>
        ${renderStars(it.familiarity || 1)}
      </div>

      <div class="actions">
        <button data-act="plus">+1</button>
        <button data-act="del" class="danger">刪除</button>
      </div>
    `;

    div.addEventListener("click", async (e) => {
      const btn = e.target.closest("button");
      if(!btn) return;

      const act = btn.dataset.act;

      if(act === "plus"){
        await supabaseClient
          .from("vocab")
          .update({ count: (it.count||0)+1 })
          .eq("id", it.id);
        await loadList();
      }

      if(act === "del"){
        await supabaseClient
          .from("vocab")
          .delete()
          .eq("id", it.id);
        await loadList();
      }

      if(act === "star"){
        const star = Number(btn.dataset.star);
        await supabaseClient
          .from("vocab")
          .update({ familiarity: star })
          .eq("id", it.id);
        await loadList();
      }
    });

    els.list.appendChild(div);
  }
}

async function upsertWord(raw){
  const w = normWord(raw);
  if(!w || !user) return;

  const now = new Date().toISOString();

  const { data } = await supabaseClient
    .from("vocab")
    .select("id,count")
    .eq("user_id", user.id)
    .eq("word", w)
    .limit(1);

  if(data && data.length){
    await supabaseClient
      .from("vocab")
      .update({ count: (data[0].count||0)+1, last_seen: now })
      .eq("id", data[0].id);
  } else {
    await supabaseClient
      .from("vocab")
      .insert({
        user_id: user.id,
        word: w,
        familiarity: 1,
        count: 1,
        created_at: now,
        last_seen: now
      });
  }

  await loadList();
}

els.addBtn.addEventListener("click", async () => {
  await upsertWord(els.wordInput.value);
  els.wordInput.value = "";
});

els.loginBtn.addEventListener("click", async () => {
  await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.origin }
  });
});

els.logoutBtn.addEventListener("click", async () => {
  await supabaseClient.auth.signOut();
  await refreshAuth();
});

(async () => {
  await refreshAuth();
})();
</script>
  
</body>
</html>
