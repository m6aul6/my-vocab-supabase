<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的AI單字本</title>
  <style>
    :root { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; }
    body { margin: 0; background:#f6f7fb; color:#111; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 18px; }
    .card { background:#fff; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.06); padding: 16px; margin-bottom: 14px; }
    h1 { font-size: 20px; margin: 0 0 10px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    input, button, textarea, select {
      border-radius: 12px; border: 1px solid #d9dce6; padding: 10px 12px; font-size: 14px; background:#fff;
    }
    input, textarea { flex: 1; min-width: 240px; }
    textarea { min-height: 84px; resize: vertical; }
    button { cursor: pointer; border: 0; background:#111; color:#fff; }
    button.secondary { background:#eef0f6; color:#111; border: 1px solid #d9dce6; }
    button.danger { background:#c62828; }
    .muted { color:#666; font-size: 12px; }
    .pill { display:inline-block; padding: 4px 10px; border-radius: 999px; background:#eef0f6; font-size: 12px; margin-right:6px; }
    .list { display:grid; grid-template-columns: 1fr; gap: 10px; }
    .item { border:1px solid #e7e9f2; border-radius: 14px; padding: 12px; }
    .itemTop { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; align-items: baseline; }
    .word { font-size: 18px; font-weight: 700; }
    .meta { font-size: 12px; color:#555; }
    .kv { margin-top:8px; font-size: 14px; line-height: 1.5; }
    .kv b { display:inline-block; min-width: 92px; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top: 10px; }
    .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 720px){ .grid2 { grid-template-columns: 1fr; } }
    .notice { background:#fff7e6; border:1px solid #ffe2a8; padding:10px 12px; border-radius:12px; font-size: 13px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>我的AI單字本</h1>

      <div class="row">
        <button id="loginBtn">Google 登入</button>
        <button id="logoutBtn" class="secondary" style="display:none;">登出</button>
        <span class="muted" id="userInfo">尚未登入</span>
      </div>

      <div class="notice">
        你可以先用「加入 / +1 次」累積單字，再用「編輯 → 自動帶入（草稿）」讓 Gemini 幫你起草中文/詞性/例句/介係詞，仍保留你自己的修改空間。
      </div>
    </div>

    <div class="card" id="main" style="display:none;">
      <div class="row">
        <input id="wordInput" placeholder="輸入英文單字，例如: accountable" autocomplete="off" />
        <button id="addBtn">加入 / +1 次</button>
      </div>

      <div class="row" style="margin-top:10px;">
        <input id="searchInput" placeholder="搜尋單字或中文…" />
        <select id="sortSelect">
          <option value="lastSeen_desc">排序：最近查過</option>
          <option value="count_desc">排序：查詢次數</option>
          <option value="created_desc">排序：新增時間</option>
          <option value="alpha_asc">排序：A → Z</option>
        </select>
      </div>

      <div class="muted" style="margin-top:8px;" id="stats"></div>
      <div class="list" id="list" style="margin-top:12px;"></div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2.97.0/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://omegmriwanrgudhqyoha.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_OGKVj80-zcwumHWkIfg2bw_gn9bvt3a";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const els = {
      loginBtn: document.getElementById("loginBtn"),
      logoutBtn: document.getElementById("logoutBtn"),
      userInfo: document.getElementById("userInfo"),
      main: document.getElementById("main"),
      wordInput: document.getElementById("wordInput"),
      addBtn: document.getElementById("addBtn"),
      searchInput: document.getElementById("searchInput"),
      sortSelect: document.getElementById("sortSelect"),
      list: document.getElementById("list"),
      stats: document.getElementById("stats"),
    };

    let user = null;
    let itemsCache = [];

    function normWord(w){ return (w || "").trim().toLowerCase(); }
    function uniq(arr){ return [...new Set((arr||[]).filter(Boolean))]; }
    function escapeHTML(str){
      return (str ?? "").toString()
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function renderStars(level){
      const lv = Math.max(1, Math.min(5, Number(level || 1)));
      let html = "";
      for(let i=1;i<=5;i++){
        const filled = i <= lv;
        html += `<button class="secondary" data-act="star" data-star="${i}" style="padding:6px 10px;">${filled ? "★" : "☆"}</button>`;
      }
      return html;
    }

    async function fetchGeminiDraft(word){

  const { data: { session } } = await supabaseClient.auth.getSession();

  if (!session) {
    throw new Error("請先登入");
  }

  const r = await fetch(
    `https://omegmriwanrgudhqyoha.supabase.co/functions/v1/gemini-lookup?word=${encodeURIComponent(word)}`,
    {
      method: "GET",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${session.access_token}`
      }
    }
  );

  const text = await r.text();

  let j = {};
  try {
    j = JSON.parse(text);
  } catch {
    j = { raw: text };
  }

  if(!r.ok){
    throw new Error(
      j?.detail ||
      j?.error ||
      j?.message ||
      j?.raw ||
      `Gemini lookup failed (${r.status})`
    );
  }

  return j;
}

    async function refreshAuth(){
      const { data } = await supabaseClient.auth.getUser();
      user = data?.user || null;

      if(!user){
        els.userInfo.textContent = "尚未登入";
        els.main.style.display = "none";
        els.logoutBtn.style.display = "none";
        els.loginBtn.style.display = "";
        return;
      }

      els.userInfo.textContent = `已登入：${user.email || user.id}`;
      els.main.style.display = "";
      els.logoutBtn.style.display = "";
      els.loginBtn.style.display = "none";
      await loadList();
    }

    async function loadList(){
      if(!user) return;

      const { data, error } = await supabaseClient
        .from("vocab")
        .select("*")
        .order("last_seen", { ascending: false })
        .limit(5000);

      if(error){
        alert("讀取失敗：" + error.message);
        return;
      }

      itemsCache = data || [];
      render();
    }

    function getFilteredSorted(){
      const q = (els.searchInput.value || "").trim().toLowerCase();
      let arr = itemsCache;

      if(q){
        arr = arr.filter(it =>
          (it.word || "").includes(q) ||
          (it.zh || "").toLowerCase().includes(q) ||
          (it.pos || "").toLowerCase().includes(q) ||
          (it.example || "").toLowerCase().includes(q)
        );
      }

      const sort = els.sortSelect.value;
      const cmp = {
        lastSeen_desc: (a,b) => new Date(b.last_seen) - new Date(a.last_seen),
        count_desc: (a,b) => (b.count||0) - (a.count||0),
        created_desc: (a,b) => new Date(b.created_at) - new Date(a.created_at),
        alpha_asc: (a,b) => (a.word||"").localeCompare(b.word||""),
      }[sort] || (()=>0);

      return [...arr].sort(cmp);
    }

    function render(){
      const total = itemsCache.length;
      const totalLookups = itemsCache.reduce((s,it)=> s + (it.count||0), 0);
      els.stats.textContent = `共 ${total} 個單字｜累計查詢 ${totalLookups} 次`;

      const arr = getFilteredSorted();
      els.list.innerHTML = "";

      if(arr.length === 0){
        els.list.innerHTML = `<div class="muted">沒有資料（或搜尋不到）。</div>`;
        return;
      }

      for(const it of arr){
        const div = document.createElement("div");
        div.className = "item";

        const preps = (it.prepositions || []).map(p => `<span class="pill">${escapeHTML(p)}</span>`).join("");

        div.innerHTML = `
          <div class="itemTop">
            <div>
              <span class="word">${escapeHTML(it.word)}</span>
              ${it.pos ? `<span class="pill">${escapeHTML(it.pos)}</span>` : ""}
            </div>

            <div class="meta">
              次數：<b>${it.count || 0}</b>
            </div>
          </div>

          <div class="actions" style="margin-top:8px;">
            <span class="muted" style="margin-right:8px;">熟悉度</span>
            ${renderStars(it.familiarity || 1)}
          </div>

          <div class="kv"><b>中文解釋</b> ${escapeHTML(it.zh || "")}</div>
          <div class="kv"><b>例句</b> ${escapeHTML(it.example || "")}</div>
          <div class="kv"><b>介係詞</b> ${preps || `<span class="muted">（可編輯補上）</span>`}</div>

          <div class="actions">
            <button class="secondary" data-act="edit">編輯</button>
            <button class="secondary" data-act="plus">再查一次（+1）</button>
            <button class="danger" data-act="del">刪除</button>
          </div>

          <div data-edit style="display:none; margin-top:10px;">
            <div class="grid2">
              <div>
                <div class="muted">中文解釋</div>
                <textarea data-in="zh">${escapeHTML(it.zh||"")}</textarea>
              </div>
              <div>
                <div class="muted">詞性（noun / verb / adj...）</div>
                <input data-in="pos" value="${escapeHTML(it.pos||"")}" />
                <div class="muted" style="margin-top:8px;">介係詞（逗號分隔）</div>
                <input data-in="preps" value="${escapeHTML((it.prepositions||[]).join(", "))}" />
              </div>
            </div>

            <div class="muted" style="margin-top:8px;">例句</div>
            <textarea data-in="example">${escapeHTML(it.example||"")}</textarea>

            <div class="actions">
              <button class="secondary" data-act="draft">自動帶入（草稿）</button>
              <button data-act="save">儲存</button>
              <button class="secondary" data-act="cancel">取消</button>
            </div>
          </div>
        `;

        div.addEventListener("click", async (e) => {
          const btn = e.target.closest("button");
          if(!btn) return;
          const act = btn.dataset.act;

          if(act === "star"){
            const star = Number(btn.dataset.star || 1);
            const now = new Date().toISOString();

            const { error } = await supabaseClient
              .from("vocab")
              .update({ familiarity: star, updated_at: now })
              .eq("id", it.id);

            if(error) return alert("更新熟悉度失敗：" + error.message);
            await loadList();
            return;
          }

          if(act === "edit"){
            div.querySelector('[data-edit]').style.display = "";
            return;
          }

          if(act === "cancel"){
            div.querySelector('[data-edit]').style.display = "none";
            return;
          }

          if(act === "draft"){
            try{
              btn.textContent = "生成中…";
              btn.disabled = true;

              const draft = await fetchGeminiDraft(it.word);

              const zhEl = div.querySelector('[data-in="zh"]');
              const posEl = div.querySelector('[data-in="pos"]');
              const exEl  = div.querySelector('[data-in="example"]');
              const prepsEl = div.querySelector('[data-in="preps"]');

              if(zhEl && !zhEl.value.trim() && draft.zh) zhEl.value = draft.zh;
              if(posEl && !posEl.value.trim() && draft.pos) posEl.value = draft.pos;
              if(exEl && !exEl.value.trim() && draft.example) exEl.value = draft.example;

              if(prepsEl && !prepsEl.value.trim() && Array.isArray(draft.prepositions)){
                prepsEl.value = draft.prepositions.join(", ");
              }
            }catch(err){
              console.error("Draft error:", err);
              alert("草稿取得失敗：" + (err?.message || err));
            }finally{
              btn.textContent = "自動帶入（草稿）";
              btn.disabled = false;
            }
            return;
          }

          if(act === "save"){
            const zh = div.querySelector('[data-in="zh"]').value.trim();
            const pos = div.querySelector('[data-in="pos"]').value.trim();
            const example = div.querySelector('[data-in="example"]').value.trim();
            const prepsStr = div.querySelector('[data-in="preps"]').value.trim();
            const prepositions = uniq(prepsStr.split(",").map(s=>s.trim()).filter(Boolean));
            const now = new Date().toISOString();

            const { error } = await supabaseClient
              .from("vocab")
              .update({ zh, pos, example, prepositions, updated_at: now })
              .eq("id", it.id);

            if(error) return alert("儲存失敗：" + error.message);
            await loadList();
            return;
          }

          if(act === "del"){
            if(!confirm(`確定刪除「${it.word}」？`)) return;
            const { error } = await supabaseClient
              .from("vocab")
              .delete()
              .eq("id", it.id);

            if(error) return alert("刪除失敗：" + error.message);
            await loadList();
            return;
          }

          if(act === "plus"){
            const now = new Date().toISOString();
            const { error } = await supabaseClient
              .from("vocab")
              .update({ count: (it.count||0) + 1, last_seen: now, updated_at: now })
              .eq("id", it.id);

            if(error) return alert("更新失敗：" + error.message);
            await loadList();
            return;
          }
        });

        els.list.appendChild(div);
      }
    }

    async function upsertWord(raw){
      const w = normWord(raw);
      if(!w || !user) return;

      const now = new Date().toISOString();

      const { data: existing, error: qerr } = await supabaseClient
        .from("vocab")
        .select("id, count")
        .eq("user_id", user.id)
        .eq("word", w)
        .limit(1);

      if(qerr) return alert("查詢失敗：" + qerr.message);

      if(existing && existing.length){
        const row = existing[0];
        const { error } = await supabaseClient
          .from("vocab")
          .update({ count: (row.count||0) + 1, last_seen: now, updated_at: now })
          .eq("id", row.id);
        if(error) return alert("更新失敗：" + error.message);
      } else {
        const { error } = await supabaseClient
          .from("vocab")
          .insert({
            user_id: user.id,
            word: w,
            familiarity: 1,
            count: 1,
            created_at: now,
            last_seen: now,
            updated_at: now
          });
        if(error) return alert("新增失敗：" + error.message);
      }

      await loadList();
    }

    els.addBtn.addEventListener("click", async () => {
      await upsertWord(els.wordInput.value);
      els.wordInput.value = "";
      els.wordInput.focus();
    });

    els.wordInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter") els.addBtn.click();
    });

    els.searchInput.addEventListener("input", render);
    els.sortSelect.addEventListener("change", render);

    els.loginBtn.addEventListener("click", async () => {
      const redirectTo = window.location.href.split("#")[0];

      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo }
      });

      if (error) alert("登入失敗：" + error.message);
    });

    els.logoutBtn.addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      itemsCache = [];
      render();
      await refreshAuth();
    });

    (async () => {
      await supabaseClient.auth.getSession();
      supabaseClient.auth.onAuthStateChange(async () => {
        await refreshAuth();
      });
      await refreshAuth();
    })();
  </script>
</body>
</html>
