<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>我的單字本</title>
  <style>
    :root {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Noto Sans TC", sans-serif;
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #111111;
      --sub: #6e6e73;
      --line: #e5e5ea;
      --soft: #f2f2f7;
      --accent: #111111;
      --danger: #d92d20;
      --radius: 20px;
      --tag-word-bg: #eef4ff;
      --tag-word-text: #3559b7;
      --tag-phrase-bg: #fff4e8;
      --tag-phrase-text: #b2641a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.4;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .hero {
      padding: 6px 2px 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 8px 0 0;
      font-size: 14px;
      color: var(--sub);
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid rgba(0,0,0,.04);
      box-shadow: 0 10px 30px rgba(0,0,0,.04);
      padding: 16px;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar-left {
      display: flex;
      gap: 10px;
      flex: 1;
      flex-wrap: wrap;
    }

    .toolbar-left input {
      flex: 1 1 220px;
    }

    .toolbar-left select {
      flex: 0 0 110px;
    }

    input, button, textarea, select {
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 12px 14px;
      font-size: 15px;
      color: var(--text);
    }

    input, textarea, select {
      width: 100%;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #c7c7cc;
      box-shadow: 0 0 0 4px rgba(0,0,0,.04);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border: 0;
      font-weight: 600;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }

    button:hover { opacity: .92; }
    button:active { transform: scale(.98); }

    button.secondary {
      background: var(--soft);
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.danger {
      background: var(--danger);
      color: #fff;
    }

    .user-line {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .muted {
      color: var(--sub);
      font-size: 13px;
    }

    .stats {
      margin-top: 6px;
      color: var(--sub);
      font-size: 13px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 10px;
      margin-top: 12px;
    }

    .typeFilters,
    .reviewBar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .reviewHint {
      font-size: 13px;
      color: var(--sub);
      margin-top: 8px;
    }

    .list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .item {
      background: #fff;
      border: 1px solid rgba(0,0,0,.05);
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,.03);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .item:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(0,0,0,.05);
    }

    .itemTop {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .wordWrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .word {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .pill {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--sub);
      font-size: 12px;
      font-weight: 600;
    }

    .entryTag {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .entryTag.wordTag {
      background: var(--tag-word-bg);
      color: var(--tag-word-text);
    }

    .entryTag.phraseTag {
      background: var(--tag-phrase-bg);
      color: var(--tag-phrase-text);
    }

    .meta {
      font-size: 13px;
      color: var(--sub);
    }

    .stars {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .stars button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 6px 10px;
      font-size: 16px;
      line-height: 1;
    }

    .stars button:hover {
      transform: scale(1.05);
      background: var(--soft);
    }

    .kv {
      margin-top: 10px;
      font-size: 15px;
      color: #2c2c2e;
    }

    .kv b {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: var(--sub);
      font-weight: 600;
      letter-spacing: .02em;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .editBox {
      display: none;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .empty {
      text-align: center;
      padding: 28px 14px;
      color: var(--sub);
      font-size: 14px;
      background: #fff;
      border-radius: 20px;
      border: 1px dashed var(--line);
    }

    .reviewTag {
      display: inline-block;
      margin-left: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #fff4cc;
      color: #7a5b00;
      font-size: 12px;
      font-weight: 600;
    }

    @media (max-width: 720px) {
      .wrap { padding: 14px 12px 24px; }
      .hero h1 { font-size: 26px; }
      .filters { grid-template-columns: 1fr; }
      .grid2 { grid-template-columns: 1fr; }
      .toolbar { align-items: stretch; }
      .toolbar-left { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>我的單字本</h1>
      <p>把單字和片語分開記，會更清楚也更好複習。</p>
    </div>

    <div class="card">
      <div class="user-line">
        <button id="loginBtn">Google 登入</button>
        <button id="logoutBtn" class="secondary" style="display:none;">登出</button>
        <span class="muted" id="userInfo">尚未登入</span>
      </div>
    </div>

    <div class="card" id="main" style="display:none;">
      <div class="toolbar">
        <div class="toolbar-left">
          <input id="wordInput" placeholder="輸入單字或片語，例如 accountable / look forward to" autocomplete="off" />
          <select id="entryTypeInput">
            <option value="單字">單字</option>
            <option value="片語">片語</option>
          </select>
          <button id="addBtn">加入</button>
        </div>
        <button id="exportBtn" class="secondary">匯出 Excel</button>
      </div>

      <div class="reviewBar">
        <button id="reviewBtn" class="secondary">今日複習</button>
        <button id="showAllBtn" class="secondary">顯示全部</button>
      </div>
      <div class="reviewHint" id="reviewHint">尚未啟用今日複習。</div>

      <div class="typeFilters">
        <button id="filterAllBtn" class="secondary">全部</button>
        <button id="filterWordBtn" class="secondary">只看單字</button>
        <button id="filterPhraseBtn" class="secondary">只看片語</button>
      </div>

      <div class="filters">
        <input id="searchInput" placeholder="搜尋單字、中文、例句、備註…" />
        <select id="sortSelect">
          <option value="lastSeen_desc">排序：最近查過</option>
          <option value="count_desc">排序：查詢次數</option>
          <option value="created_desc">排序：新增時間</option>
          <option value="alpha_asc">排序：A → Z</option>
        </select>
      </div>

      <div class="stats" id="stats"></div>
      <div class="list" id="list"></div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2.97.0/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script>
    const SUPABASE_URL = "https://omegmriwanrgudhqyoha.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_OGKVj80-zcwumHWkIfg2bw_gn9bvt3a";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const els = {
      loginBtn: document.getElementById("loginBtn"),
      logoutBtn: document.getElementById("logoutBtn"),
      userInfo: document.getElementById("userInfo"),
      main: document.getElementById("main"),
      wordInput: document.getElementById("wordInput"),
      entryTypeInput: document.getElementById("entryTypeInput"),
      addBtn: document.getElementById("addBtn"),
      exportBtn: document.getElementById("exportBtn"),
      reviewBtn: document.getElementById("reviewBtn"),
      showAllBtn: document.getElementById("showAllBtn"),
      reviewHint: document.getElementById("reviewHint"),
      filterAllBtn: document.getElementById("filterAllBtn"),
      filterWordBtn: document.getElementById("filterWordBtn"),
      filterPhraseBtn: document.getElementById("filterPhraseBtn"),
      searchInput: document.getElementById("searchInput"),
      sortSelect: document.getElementById("sortSelect"),
      list: document.getElementById("list"),
      stats: document.getElementById("stats"),
    };

    let user = null;
    let itemsCache = [];
    let reviewMode = false;
    let reviewIds = [];
    let typeFilter = "全部";

    function normWord(w){ return (w || "").trim().toLowerCase(); }
    function uniq(arr){ return [...new Set((arr||[]).filter(Boolean))]; }

    function escapeHTML(str){
      return (str ?? "").toString()
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function renderStars(level){
      const lv = Math.max(1, Math.min(5, Number(level || 1)));
      let html = "";
      for(let i=1;i<=5;i++){
        const filled = i <= lv;
        html += `<button class="secondary" data-act="star" data-star="${i}">${filled ? "★" : "☆"}</button>`;
      }
      return html;
    }

    function renderEntryTag(type){
      const safeType = type || "單字";
      const cls = safeType === "片語" ? "phraseTag" : "wordTag";
      return `<span class="entryTag ${cls}">${escapeHTML(safeType)}</span>`;
    }

    function getFilteredSorted(){
      const q = (els.searchInput.value || "").trim().toLowerCase();
      let arr = itemsCache;

      if (reviewMode) {
        arr = arr.filter(it => reviewIds.includes(it.id));
      }

      if (typeFilter !== "全部") {
        arr = arr.filter(it => (it.entry_type || "單字") === typeFilter);
      }

      if(q){
        arr = arr.filter(it =>
          (it.word || "").includes(q) ||
          (it.zh || "").toLowerCase().includes(q) ||
          (it.pos || "").toLowerCase().includes(q) ||
          (it.example || "").toLowerCase().includes(q) ||
          (it.note || "").toLowerCase().includes(q) ||
          (it.entry_type || "").toLowerCase().includes(q)
        );
      }

      const sort = els.sortSelect.value;
      const cmp = {
        lastSeen_desc: (a,b) => new Date(b.last_seen) - new Date(a.last_seen),
        count_desc: (a,b) => (b.count||0) - (a.count||0),
        created_desc: (a,b) => new Date(b.created_at) - new Date(a.created_at),
        alpha_asc: (a,b) => (a.word||"").localeCompare(b.word||""),
      }[sort] || (()=>0);

      return [...arr].sort(cmp);
    }

    function buildReviewList() {
      const base = itemsCache.filter(it => {
        if (typeFilter === "全部") return true;
        return (it.entry_type || "單字") === typeFilter;
      });

      const ranked = [...base].sort((a, b) => {
        const fa = a.familiarity || 1;
        const fb = b.familiarity || 1;
        if (fa !== fb) return fa - fb;

        const ca = a.count || 0;
        const cb = b.count || 0;
        if (ca !== cb) return ca - cb;

        return new Date(a.last_seen || 0) - new Date(b.last_seen || 0);
      });

      return ranked.slice(0, 10).map(it => it.id);
    }

    async function refreshAuth(){
      const { data } = await supabaseClient.auth.getUser();
      user = data?.user || null;

      if(!user){
        els.userInfo.textContent = "尚未登入";
        els.main.style.display = "none";
        els.logoutBtn.style.display = "none";
        els.loginBtn.style.display = "";
        return;
      }

      els.userInfo.textContent = `已登入：${user.email || user.id}`;
      els.main.style.display = "";
      els.logoutBtn.style.display = "";
      els.loginBtn.style.display = "none";
      await loadList();
    }

    async function loadList(){
      if(!user) return;

      const { data, error } = await supabaseClient
        .from("vocab")
        .select("*")
        .order("last_seen", { ascending: false })
        .limit(5000);

      if(error){
        alert("讀取失敗：" + error.message);
        return;
      }

      itemsCache = data || [];
      render();
    }

    function render(){
      const total = itemsCache.length;
      const totalLookups = itemsCache.reduce((s,it)=> s + (it.count||0), 0);
      els.stats.textContent = `共 ${total} 筆｜累計查詢 ${totalLookups} 次｜目前分類：${typeFilter}`;

      const arr = getFilteredSorted();
      els.list.innerHTML = "";

      if(arr.length === 0){
        els.list.innerHTML = `<div class="empty">目前沒有符合條件的資料。</div>`;
        return;
      }

      for(const it of arr){
        const div = document.createElement("div");
        div.className = "item";

        const preps = (it.prepositions || []).map(p => `<span class="pill">${escapeHTML(p)}</span>`).join("");
        const isInReview = reviewMode && reviewIds.includes(it.id);
        const entryType = it.entry_type || "單字";

        div.innerHTML = `
          <div class="itemTop">
            <div class="wordWrap">
              <span class="word">${escapeHTML(it.word)}</span>
              ${renderEntryTag(entryType)}
              ${it.pos ? `<span class="pill">${escapeHTML(it.pos)}</span>` : ""}
              ${isInReview ? `<span class="reviewTag">今日複習</span>` : ""}
            </div>
            <div class="meta">查詢次數：<b>${it.count || 0}</b></div>
          </div>

          <div class="stars">
            <span class="muted">熟悉度</span>
            ${renderStars(it.familiarity || 1)}
          </div>

          <div class="kv">
            <b>中文解釋</b>
            ${escapeHTML(it.zh || "") || "—"}
          </div>

          <div class="kv">
            <b>例句</b>
            ${escapeHTML(it.example || "") || "—"}
          </div>

          <div class="kv">
            <b>介係詞</b>
            ${preps || `<span class="muted">尚未填寫</span>`}
          </div>

          <div class="kv">
            <b>備註</b>
            ${escapeHTML(it.note || "") || "—"}
          </div>

          <div class="actions">
            <button class="secondary" data-act="edit">編輯</button>
            <button class="danger" data-act="del">刪除</button>
          </div>

          <div class="editBox" data-edit>
            <div class="grid2">
              <div>
                <div class="muted" style="margin-bottom:6px;">中文解釋</div>
                <textarea data-in="zh">${escapeHTML(it.zh||"")}</textarea>
              </div>
              <div>
                <div class="muted" style="margin-bottom:6px;">類型</div>
                <select data-in="entry_type">
                  <option value="單字" ${entryType === "單字" ? "selected" : ""}>單字</option>
                  <option value="片語" ${entryType === "片語" ? "selected" : ""}>片語</option>
                </select>

                <div class="muted" style="margin:10px 0 6px;">詞性</div>
                <input data-in="pos" value="${escapeHTML(it.pos||"")}" />

                <div class="muted" style="margin:10px 0 6px;">介係詞（逗號分隔）</div>
                <input data-in="preps" value="${escapeHTML((it.prepositions||[]).join(", "))}" />
              </div>
            </div>

            <div class="muted" style="margin:12px 0 6px;">例句</div>
            <textarea data-in="example">${escapeHTML(it.example||"")}</textarea>

            <div class="muted" style="margin:12px 0 6px;">備註</div>
            <textarea data-in="note">${escapeHTML(it.note||"")}</textarea>

            <div class="actions">
              <button data-act="save">儲存</button>
              <button class="secondary" data-act="cancel">取消</button>
            </div>
          </div>
        `;

        div.addEventListener("click", async (e) => {
          const btn = e.target.closest("button");
          if(!btn) return;
          const act = btn.dataset.act;

          if(act === "star"){
            const star = Number(btn.dataset.star || 1);
            const now = new Date().toISOString();

            const { error } = await supabaseClient
              .from("vocab")
              .update({ familiarity: star, updated_at: now })
              .eq("id", it.id);

            if(error) return alert("更新熟悉度失敗：" + error.message);
            await loadList();
            return;
          }

          if(act === "edit"){
            div.querySelector('[data-edit]').style.display = "block";
            return;
          }

          if(act === "cancel"){
            div.querySelector('[data-edit]').style.display = "none";
            return;
          }

          if(act === "save"){
            const zh = div.querySelector('[data-in="zh"]').value.trim();
            const pos = div.querySelector('[data-in="pos"]').value.trim();
            const example = div.querySelector('[data-in="example"]').value.trim();
            const note = div.querySelector('[data-in="note"]').value.trim();
            const entry_type = div.querySelector('[data-in="entry_type"]').value;
            const prepsStr = div.querySelector('[data-in="preps"]').value.trim();
            const prepositions = uniq(prepsStr.split(",").map(s=>s.trim()).filter(Boolean));
            const now = new Date().toISOString();

            const { error } = await supabaseClient
              .from("vocab")
              .update({ zh, pos, example, note, entry_type, prepositions, updated_at: now })
              .eq("id", it.id);

            if(error) return alert("儲存失敗：" + error.message);
            await loadList();
            return;
          }

          if(act === "del"){
            if(!confirm(`確定刪除「${it.word}」？`)) return;
            const { error } = await supabaseClient
              .from("vocab")
              .delete()
              .eq("id", it.id);

            if(error) return alert("刪除失敗：" + error.message);
            await loadList();
            return;
          }
        });

        els.list.appendChild(div);
      }
    }

    async function upsertWord(raw){
      const w = normWord(raw);
      if(!w || !user) return;

      const entry_type = els.entryTypeInput.value || "單字";
      const now = new Date().toISOString();

      const { data: existing, error: qerr } = await supabaseClient
        .from("vocab")
        .select("id, count")
        .eq("user_id", user.id)
        .eq("word", w)
        .limit(1);

      if(qerr) return alert("查詢失敗：" + qerr.message);

      if(existing && existing.length){
        const row = existing[0];
        const { error } = await supabaseClient
          .from("vocab")
          .update({ count: (row.count||0) + 1, last_seen: now, updated_at: now })
          .eq("id", row.id);

        if(error) return alert("更新失敗：" + error.message);
      } else {
        const { error } = await supabaseClient
          .from("vocab")
          .insert({
            user_id: user.id,
            word: w,
            entry_type,
            familiarity: 1,
            count: 1,
            created_at: now,
            last_seen: now,
            updated_at: now,
            note: ""
          });

        if(error) return alert("新增失敗：" + error.message);
      }

      await loadList();
    }

    function exportToExcel(){
      const rows = getFilteredSorted().map(it => ({
        類型: it.entry_type || "單字",
        單字或片語: it.word || "",
        中文解釋: it.zh || "",
        詞性: it.pos || "",
        介係詞: Array.isArray(it.prepositions) ? it.prepositions.join(", ") : "",
        例句: it.example || "",
        備註: it.note || "",
        查詢次數: it.count || 0,
        熟悉度: it.familiarity || 1
      }));

      if(!rows.length){
        alert("目前沒有資料可以匯出");
        return;
      }

      const worksheet = XLSX.utils.json_to_sheet(rows);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "單字本");

      const now = new Date();
      const filename = `我的AI單字本_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}.xlsx`;

      XLSX.writeFile(workbook, filename);
    }

    els.addBtn.addEventListener("click", async () => {
      await upsertWord(els.wordInput.value);
      els.wordInput.value = "";
      els.wordInput.focus();
    });

    els.exportBtn.addEventListener("click", () => {
      exportToExcel();
    });

    els.reviewBtn.addEventListener("click", () => {
      reviewIds = buildReviewList();
      reviewMode = true;
      els.reviewHint.textContent = reviewIds.length
        ? `今日複習已啟用：目前顯示 ${reviewIds.length} 筆建議複習資料。`
        : "目前沒有可複習的資料。";
      render();
    });

    els.showAllBtn.addEventListener("click", () => {
      reviewMode = false;
      reviewIds = [];
      els.reviewHint.textContent = "已切換回全部資料。";
      render();
    });

    els.filterAllBtn.addEventListener("click", () => {
      typeFilter = "全部";
      render();
    });

    els.filterWordBtn.addEventListener("click", () => {
      typeFilter = "單字";
      render();
    });

    els.filterPhraseBtn.addEventListener("click", () => {
      typeFilter = "片語";
      render();
    });

    els.wordInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter") els.addBtn.click();
    });

    els.searchInput.addEventListener("input", render);
    els.sortSelect.addEventListener("change", render);

    els.loginBtn.addEventListener("click", async () => {
      const redirectTo = window.location.href.split("#")[0];

      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo }
      });

      if (error) alert("登入失敗：" + error.message);
    });

    els.logoutBtn.addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      itemsCache = [];
      reviewMode = false;
      reviewIds = [];
      typeFilter = "全部";
      render();
      await refreshAuth();
    });

    (async () => {
      await supabaseClient.auth.getSession();
      supabaseClient.auth.onAuthStateChange(async () => {
        await refreshAuth();
      });
      await refreshAuth();
    })();
  </script>
</body>
</html>
